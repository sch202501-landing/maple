<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#081633" />
  <meta name="description" content="메이플스토리 메소 + 큐브 지급 이벤트 안내 랜딩페이지" />
  <title>메이플스토리 메소 + 큐브 지급 이벤트 안내 랜딩페이지 </title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- [1] 히어로 섹션 -->
  <section class="hero" aria-label="홍보 배너">
    <a class="hero__link" href="https://t.me/+t-zQdNAdbWA4MTg1" target="_blank" rel="noopener noreferrer"
      aria-label="이벤트 공지채널 이동"></a>
  </section>



  <!-- [3] 최종 CTA 섹션 -->
  <section class="final" aria-label="최종 안내">
    <div class="final__inner">
      <h2 class="final__title reveal">
        지금 원하는 경로로<br />
        <em>바로 이동</em>하세요
      </h2>
      <p class="final__desc reveal">클릭 한 번이면 충분합니다</p>

      <div class="final__actions">
        <a class="btn btn--ghost btn--lg reveal" href="https://open.kakao.com/o/gmO4Mrsi" target="_blank"
          rel="noopener">
          <span class="btn__icon" aria-hidden="true">💬</span>
          <span>카카오톡 문의</span>
        <a class="btn btn--ghost btn--lg reveal" href="https://t.me/sun0450" target="_blank"
          rel="noopener">
          <span class="btn__icon" aria-hidden="true">💬</span>
          <span>텔레그램 문의</span>
        </a>
      </div>
    </div>
  </section>

  <!-- 하단 여백 (고정 네비에 가려지지 않도록) -->
  <div class="bottom-spacer" aria-hidden="true"></div>

  <!-- 하단 고정 네비게이션 -->
  <nav class="dock" aria-label="주요 액션">
    <a class="dock__primary" href="https://t.me/+t-zQdNAdbWA4MTg1" target="_blank" rel="noopener">
      <span class="dock__icon" aria-hidden="true">🔗</span>
      <span class="dock__label">이벤트 5종 상세보기</span>
    </a>
    <button class="dock__secondary" type="button" id="openContact" aria-haspopup="dialog" aria-controls="contactSheet"
      aria-expanded="false">
      <span class="dock__icon" aria-hidden="true">💬</span>
      <span class="dock__label">문의</span>
    </button>
  </nav>

  <!-- 문의 바텀 시트 -->
  <div class="sheet" id="contactSheet" role="dialog" aria-modal="true" aria-labelledby="contactSheetTitle"
    aria-hidden="true">
    <div class="sheet__backdrop" data-close-sheet></div>
    <div class="sheet__panel" role="document">
      <div class="sheet__handle" aria-hidden="true"></div>
      <h2 class="sheet__title" id="contactSheetTitle">문의하기</h2>
      <p class="sheet__desc">편하신 채널을 선택해주세요</p>

      <div class="sheet__actions">
        <a class="btn btn--primary btn--lg" href="https://open.kakao.com/o/gmO4Mrsi" target="_blank" rel="noopener">
          <span class="btn__icon" aria-hidden="true">💬</span>
          <span>카카오톡으로 문의</span>
        </a>
        <a class="btn btn--ghost btn--lg" href="https://t.me/sun0450" target="_blank" rel="noopener">
          <span class="btn__icon" aria-hidden="true">✈️</span>
          <span>텔레그램으로 문의</span>
        </a>
      </div>

      <button type="button" class="sheet__close" data-close-sheet aria-label="닫기">
        닫기
      </button>
    </div>
  </div>

  <script src="./js/script.js" defer></script>
</body>

</html>
